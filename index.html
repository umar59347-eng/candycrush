<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Candy Crush - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>🍬 Candy Crush</h1>
            <p class="subtitle">Telegram Mini App</p>
        </div>

        <!-- Stats Section -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreValue">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Moves</div>
                <div class="stat-value" id="movesValue">20</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="levelValue">1</div>
            </div>
        </div>

        <!-- Game Grid -->
        <div class="game-container">
            <div class="game-grid" id="gameGrid">
                <!-- Grid will be generated by JavaScript -->
            </div>
        </div>

        <!-- Game Over Modal -->
        <div class="modal" id="gameOverModal" style="display: none;">
            <div class="modal-content">
                <h2>Game Over! 🎮</h2>
                <p>Final Score: <strong id="finalScore">0</strong></p>
                <p id="gameMessage">Score more points!</p>
                <button onclick="resetGame()" class="btn-primary">Play Again</button>
                <button onclick="shareScore()" class="btn-secondary">Share Score</button>
            </div>
        </div>

        <!-- Instructions -->
        <div class="instructions">
            <h3>کیسے کھیلیں:</h3>
            <ul>
                <li>✓ دو قریبی کینڈیز کو swap کریں</li>
                <li>✓ 3 یا زیادہ کی matching کریں</li>
                <li>✓ Points جیتیں اور Level بڑھائیں</li>
                <li>✓ محدود Moves میں سب سے زیادہ Score حاصل کریں</li>
            </ul>
        </div>

        <!-- Footer -->
        <div class="footer">
            <button onclick="resetGame()" class="btn-reset">🔄 نئی گیم</button>
            <button onclick="openSettings()" class="btn-settings">⚙️ Settings</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
